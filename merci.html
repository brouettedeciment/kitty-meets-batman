<!DOCTYPE html>
<html lang="fr">
    <head>
    <meta charset="UTF-8" />
    <title>💖 Date Validé ! 💖</title>

    <link rel="stylesheet" href="./styles.css" />

    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap"
        rel="stylesheet"
    />
    </head>

    <body>
        <div id="floating-container"></div>
        <div class="background-hearts"></div>
        <div class="music-player">
            <button id="musicToggle">🎵</button>
            <input id="volumeSlider" type="range" min="0" max="100" value="30" />
        </div>

        <main class="container">
            <div class="card confirmation-card">

                <img
                    src="Hello Kitty.png"
                    class="kitty"
                >

                <h1>💖 Formulaire envoyé 💖</h1>

                <p>
                    Merci pour ta participation.
                </p>

                <p>
                    Les experts du comité des rendez-vous
                    vont analyser ta demande.
                </p>

                <img
                    src="Hello Kitty and Batman.png"
                    class="kitty"
                >

            </div>
        </main>

        <audio id="bgMusic" loop>
            <source src="happy-ending.mp3">
        </audio>
        <script src="script.js"></script>
    </body>
</html>
